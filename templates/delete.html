{% extends "base.html" %}
{% block content %}
<h1>削除</h1>
<p>以下の記録を削除しますか？</p>

<form method="POST">
  <table border="1">
    <tr>
      <th>種別</th>
      <th>施設名</th>
      <th>都道府県</th>
      <th>訪問日</th>
      <th>お気に入りの動物</th>
      <th>メモ</th>
    </tr>
    <tr>
      <td><input type="text" value="{{post.facility_type}}" disabled></td>
      <td><input type="text" value="{{post.facility_name}}" disabled></td>
      <td><input type="text" value="{{post.prefecture}}" disabled></td>
      <td><input type="text" value="{{post.visit_date}}" disabled></td>
      <td><input type="text" value="{{post.favorite_animal}}" disabled></td>
      <td><input type="text" value="{{post.memo}}" disabled></td>
    </tr>
  </table>

  <input type="submit" value="削除">
</form>

<a href="/">一覧に戻る</a>
{% endblock %}
